<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Email Marketing Tool</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:40px;
}

.container{
width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

#editor{
border:1px solid #ccc;
padding:15px;
min-height:250px;
}

button{
padding:10px;
margin-top:10px;
}

.progress{
height:20px;
background:#ddd;
margin-top:15px;
}

.bar{
height:100%;
width:0%;
background:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<h2>Email Sender</h2>

<input id="subject" placeholder="Email Subject">

<br><br>

<div id="editor" contenteditable="true">

<h2>Hello</h2>
<p>Write your email content here...</p>

</div>

<br>

<input type="file" id="imageFile">
<button onclick="uploadImage()">Upload Image</button>

<br><br>

<input type="file" id="videoFile">
<button onclick="uploadVideo()">Upload Video</button>

<br><br>

<button onclick="sendEmails()">Send Emails</button>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<p id="status"></p>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzfzCouEPlxJ9fZVVCaCsQK8nYwTy7dPgMKe3cVDmQWWZAcYGM-aD0MWUTBbSzqOcXbCg/exec";

function uploadFile(file){

return new Promise(resolve=>{

let reader=new FileReader();

reader.onload=function(){

let base64=reader.result.split(",")[1];

let url=scriptURL+
"?action=upload"+
"&data="+encodeURIComponent(base64)+
"&name="+file.name+
"&type="+file.type+
"&callback=fileUploadResponse";

let script=document.createElement("script");

window.fileUploadResponse=function(data){
resolve(data.url);
};

script.src=url;

document.body.appendChild(script);

};

reader.readAsDataURL(file);

});

}

async function uploadImage(){

let file=document.getElementById("imageFile").files[0];

let url=await uploadFile(file);

document.getElementById("editor")
.innerHTML+=`<br><img src="${url}" width="400"><br>`;

}

async function uploadVideo(){

let file=document.getElementById("videoFile").files[0];

let url=await uploadFile(file);

document.getElementById("editor")
.innerHTML+=`<br><a href="${url}">Watch Video</a><br>`;

}

function sendEmails(){

let subject=document.getElementById("subject").value;
let content=document.getElementById("editor").innerHTML;

let url=scriptURL+
"?action=send"+
"&subject="+encodeURIComponent(subject)+
"&content="+encodeURIComponent(content)+
"&callback=emailResponse";

let script=document.createElement("script");
script.src=url;

document.body.appendChild(script);

document.getElementById("status").innerText="Sending emails...";

}

function emailResponse(data){

document.getElementById("bar").style.width="100%";

document.getElementById("status").innerText=
"Sent "+data.sent+" of "+data.total+" emails";

}

</script>

</body>

</html>
