<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Email CRM</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:40px;
}

.container{
width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

#editor{
border:1px solid #ccc;
padding:15px;
min-height:200px;
}

button{
padding:10px 15px;
margin-top:10px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

.progress{
height:20px;
background:#ddd;
margin-top:15px;
}

.bar{
height:100%;
width:0%;
background:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<h2>Bulk Email Sender</h2>

<input id="subject" placeholder="Email Subject">

<div id="editor" contenteditable="true">

<h2>Hello</h2>
<p>Write email content here</p>

</div>

<br>

<button onclick="sendEmails()">Send Emails</button>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<p id="status"></p>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbz4w9aRCIborKjuEkA-o-aXAxZH52QBd_u4AR_4nmPekvoC8FH0GvE5UciqT10xqbZLaw/exec";

function sendEmails(){

let subject=document.getElementById("subject").value;
let content=document.getElementById("editor").innerHTML;

let url = scriptURL +
"?subject=" + encodeURIComponent(subject) +
"&content=" + encodeURIComponent(content) +
"&callback=emailResponse";

let script=document.createElement("script");

script.src=url;

document.body.appendChild(script);

document.getElementById("status").innerText="Sending emails...";

}

function emailResponse(data){

document.getElementById("bar").style.width="100%";

document.getElementById("status").innerText=
"Sent " + data.sent + " of " + data.total + " emails";

}

</script>

</body>

</html>
