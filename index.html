<!DOCTYPE html>
<html>

<head>

<title>Email Sender</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:40px;
}

.container{
width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

#editor{
border:1px solid #ccc;
padding:15px;
min-height:250px;
}

button{
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Email Sender</h2>

<input id="subject" placeholder="Subject">

<br><br>

<div id="editor" contenteditable="true">

<h2>Hello</h2>

<p>Write email content here</p>

</div>

<br>

<input type="file" id="imageFile">

<button onclick="uploadImage()">Upload Image</button>

<br><br>

<input type="file" id="videoFile">

<button onclick="uploadVideo()">Upload Video</button>

<br><br>

<button onclick="sendEmails()">Send Emails</button>

<p id="status"></p>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbxHhX3-i0v_9FZUzU0PeZfAwFD73xzfqZ7sEZIu8TVE-qgXGlXL9Z9NNWF1xMcsBlWOKw/exec";

function uploadFile(file){

return new Promise(resolve=>{

let reader=new FileReader();

reader.onload=function(){

let base64=reader.result.split(",")[1];

let url=scriptURL+
"?action=upload"+
"&data="+encodeURIComponent(base64)+
"&name="+file.name+
"&type="+file.type;

fetch(url)
.then(res=>res.json())
.then(data=>resolve(data.url));

};

reader.readAsDataURL(file);

});

}

async function uploadImage(){

let file=document.getElementById("imageFile").files[0];

let url=await uploadFile(file);

document.getElementById("editor")
.innerHTML+=`<br><img src="${url}" width="400"><br>`;

}

async function uploadVideo(){

let file=document.getElementById("videoFile").files[0];

let url=await uploadFile(file);

document.getElementById("editor")
.innerHTML+=`<br><a href="${url}">Watch Video</a><br>`;

}

function sendEmails(){

let subject=document.getElementById("subject").value;

let content=document.getElementById("editor").innerHTML;

let url=scriptURL+
"?action=send"+
"&subject="+encodeURIComponent(subject)+
"&content="+encodeURIComponent(content);

fetch(url)
.then(res=>res.json())
.then(data=>{

document.getElementById("status").innerText=
"Sent "+data.sent+" of "+data.total;

});

}

</script>

</body>

</html>
